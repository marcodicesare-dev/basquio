<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Slide frame -->
  <rect width="960" height="540" fill="#ffffff" filter="url(#shadow3)"/>
  <rect width="960" height="4" fill="#1a6aff"/>

  <!-- Section label -->
  <text x="56" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1.5" fill="#94A3B8">STRATEGIC RECOMMENDATIONS</text>

  <!-- Title -->
  <text x="56" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0b0c0c" letter-spacing="-0.5">Three Moves to Capture $180M in Incremental Revenue</text>
  <text x="56" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0b0c0c" letter-spacing="-0.5">Over 18 Months</text>

  <!-- Card 1 -->
  <rect x="56" y="150" width="270" height="300" rx="0" fill="#f8f5ef" stroke="#e8e4db" stroke-width="1"/>
  <circle cx="82" cy="180" r="16" fill="#1a6aff"/>
  <text x="82" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="106" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1" fill="#94A3B8">MOVE NOW</text>
  <text x="76" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0b0c0c">Expand Cloud Platform</text>
  <text x="76" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0b0c0c">Into Data Orchestration</text>
  <text x="76" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5d656b">
    <tspan x="76" dy="0">Data Platform grew 14.7% but</tspan>
    <tspan x="76" dy="18">orchestration is fragmented.</tspan>
    <tspan x="76" dy="18">Bundle cloud + data for</tspan>
    <tspan x="76" dy="18">enterprise accounts that</tspan>
    <tspan x="76" dy="18">already use both products.</tspan>
  </text>
  <text x="76" y="396" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1a6aff">Impact: $85M incremental ARR</text>
  <text x="76" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Timeline: Q2-Q3 2026</text>
  <text x="76" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Confidence: HIGH (78% overlap)</text>

  <!-- Card 2 -->
  <rect x="346" y="150" width="270" height="300" rx="0" fill="#f8f5ef" stroke="#e8e4db" stroke-width="1"/>
  <circle cx="372" cy="180" r="16" fill="#1a6aff" opacity="0.7"/>
  <text x="372" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="396" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1" fill="#94A3B8">NEXT QUARTER</text>
  <text x="366" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0b0c0c">Launch Security Add-On</text>
  <text x="366" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0b0c0c">For Mid-Market Accounts</text>
  <text x="366" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5d656b">
    <tspan x="366" dy="0">Mid-market security spend</tspan>
    <tspan x="366" dy="18">grew 11.3% but penetration</tspan>
    <tspan x="366" dy="18">is only 34%. A simplified</tspan>
    <tspan x="366" dy="18">compliance package can</tspan>
    <tspan x="366" dy="18">capture the underserved tail.</tspan>
  </text>
  <text x="366" y="396" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1a6aff">Impact: $55M incremental ARR</text>
  <text x="366" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Timeline: Q3-Q4 2026</text>
  <text x="366" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Confidence: MEDIUM (new segment)</text>

  <!-- Card 3 -->
  <rect x="636" y="150" width="270" height="300" rx="0" fill="#f8f5ef" stroke="#e8e4db" stroke-width="1"/>
  <circle cx="662" cy="180" r="16" fill="#94A3B8"/>
  <text x="662" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="686" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" letter-spacing="1" fill="#94A3B8">EVALUATE</text>
  <text x="656" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0b0c0c">Sunset On-Prem Tiers</text>
  <text x="656" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0b0c0c">Migrate to Managed Cloud</text>
  <text x="656" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#5d656b">
    <tspan x="656" dy="0">On-prem declined -6.2% and</tspan>
    <tspan x="656" dy="18">carries 3x support cost per</tspan>
    <tspan x="656" dy="18">account. Migration incentive</tspan>
    <tspan x="656" dy="18">could convert 40% of install</tspan>
    <tspan x="656" dy="18">base within 12 months.</tspan>
  </text>
  <text x="656" y="396" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1a6aff">Impact: $40M margin recovery</text>
  <text x="656" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Timeline: H2 2026</text>
  <text x="656" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Confidence: MEDIUM (churn risk)</text>

  <!-- Footer -->
  <text x="56" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94A3B8">Source: Uploaded dataset · Analysis by Basquio</text>
  <text x="904" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94A3B8" text-anchor="end">09</text>
</svg>
