<body style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 40px 20px;">
  <table cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 520px; margin: 0 auto;">
    <tr>
      <td>
        <p style="color: #94A3B8; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; margin: 0 0 16px 0; text-transform: uppercase;">CONFIRM</p>
        <img src="https://basquio.com/brand/png/logo/1x/basquio-logo-light-bg-mono.png" alt="Basquio" width="100" height="auto" style="display: block; margin-bottom: 32px;">
        <p style="color: #0b0c0c; font-size: 14px; line-height: 24px; margin: 0 0 20px 0;">Please confirm your new email address by clicking the button below.</p>
        <table cellpadding="0" cellspacing="0" border="0" style="margin: 24px 0;">
          <tr>
            <td>
              <a href="{{ .ConfirmationURL }}" style="background-color: #1a6aff; border-radius: 4px; color: #FFFFFF; display: inline-block; font-size: 14px; font-weight: 600; padding: 12px 24px; text-decoration: none;">Confirm email</a>
            </td>
          </tr>
        </table>
        <p style="color: #94A3B8; font-size: 13px; line-height: 20px; margin: 0;">If you did not request this change, contact support immediately.</p>
        <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-top: 1px solid #E2E8F0; margin-top: 32px; padding-top: 24px;">
          <tr>
            <td style="vertical-align: middle;">
              <img src="https://basquio.com/brand/png/logo/1x/basquio-logo-light-bg-mono.png" alt="Basquio" width="60" height="auto" style="display: block; margin-bottom: 4px;">
              <p style="color: #94A3B8; font-size: 12px; margin: 0;">Evidence in. Executive deck out.</p>
            </td>
            <td align="right" style="vertical-align: middle;">
              <img src="https://basquio.com/brand/png/icon/1x/basquio-icon-onyx.png" alt="Basquio" width="32" height="32" style="display: block;">
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
