project_id = "fxvbvkpzzvrkwvqmecmi"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://basquio.com"
additional_redirect_urls = [
  "https://basquio.com/auth/callback",
  "https://basquio.com/auth/reset-password",
  "https://www.basquio.com/auth/callback",
  "https://www.basquio.com/auth/reset-password",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/reset-password",
]
jwt_expiry = 3600
jwt_issuer = "http://127.0.0.1:54321/auth/v1"
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600
