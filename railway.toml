# DECK WORKER service config — DO NOT use for any other service.
#
# This file is consumed ONLY by the deck-worker service on Railway. It builds
# Dockerfile.worker and runs scripts/worker.ts.
#
# IMPORTANT: do NOT add a second service to this config. The Discord bot has
# its own config at apps/bot/railway.toml — see apps/bot/README.md and
# docs/decision-log.md "Service-scoped Railway configs" for the forensic on
# why mixing services in one config killed the Discord bot for 24 hours on
# Apr 21 2026.
#
# Audit-before-touch checklist for any change to this file or Dockerfile.worker:
#   1. railway list                            (confirm services that exist)
#   2. railway variables --service <name>      (env per service)
#   3. railway logs --service <name>           (tail post-deploy for crash loops)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.worker"
watchPatterns = [
  "Dockerfile.worker",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "tsconfig.json",
  "tsconfig.base.json",
  "nixpacks.toml",
  "railway.toml",
  "scripts/**",
  "packages/**",
  "supabase/**",
]

[deploy]
# Dispatcher — see scripts/railway-entrypoint.sh. Picks between Discord bot
# (DISCORD_BOT_TOKEN present) and deck worker (otherwise). This file is the
# root config both services currently share. The proper long-term fix is
# per-service Config-as-Code Paths (apps/bot/railway.toml for the bot),
# but the dispatcher guarantees correctness even if the dashboard setting
# is wrong — see docs/decision-log.md "Service-scoped Railway configs".
startCommand = "bash scripts/railway-entrypoint.sh"
restartPolicyType = "always"
overlapSeconds = 90
drainingSeconds = 60
