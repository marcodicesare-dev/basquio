version: "1.0"
project: basquio
description: >
  Agent scaffold for an intelligence-first presentation generation product.
  The system separates evidence-package understanding, insight generation,
  report planning, template and brand interpretation, rendering, and QA.

agents:
  coordinator:
    name: Basquio Coordinator
    role: orchestrator
    responsibilities:
      - load canonical docs and memory
      - load stack practices before touching infrastructure or rendering libraries
      - dispatch specialized agents in order
      - validate schema outputs between phases
      - require QA before implementation milestones
    execution_order:
      - stack-governor
      - dataset-profiler
      - analytics-engineer
      - insight-ranker
      - narrative-planner
      - brand-interpreter
      - template-interpreter
      - render-architect
      - qa-guardian

  stack-governor:
    name: Stack Governor
    role: systems
    responsibilities:
      - enforce official-library best practices for Supabase, Inngest, Browserless, ECharts, SheetJS, PptxGenJS, and pptx-automizer
      - keep service-role usage server-only
      - protect private artifact delivery and workflow idempotency
      - stop preview-layer choices from becoming export architecture

  dataset-profiler:
    name: Dataset Profiler
    role: analyst
    output: Dataset manifest and DatasetProfile
    responsibilities:
      - infer file roles across multi-file evidence packages
      - preserve the evidence-package manifest instead of flattening file identity away
      - infer schema
      - identify time fields
      - detect measures and dimensions
      - emit data-quality warnings

  analytics-engineer:
    name: Analytics Engineer
    role: analyst
    input: DatasetProfile
    output: Deterministic metrics and anomaly summaries
    responsibilities:
      - compute deltas
      - detect outliers
      - detect rankings and segment shifts

  insight-ranker:
    name: Insight Ranker
    role: reasoning
    input:
      - DatasetProfile
      - deterministic summaries
    output: InsightSpec[]
    responsibilities:
      - propose insights
      - attach evidence
      - score confidence and business relevance

  narrative-planner:
    name: Narrative Planner
    role: reasoning
    input:
      - InsightSpec[]
      - business context
      - audience
      - thesis
    output: StorySpec and ReportOutline
    responsibilities:
      - establish the report thesis and executive angle
      - build general-to-specific story arc
      - select the report spine before slide layout planning
      - map framing, methodology, findings, implications, and recommendations into an explicit outline

  brand-interpreter:
    name: Brand Interpreter
    role: systems
    input:
      - brand token files
      - logo assets
      - optional brand guide documents
    output: TemplateProfile
    responsibilities:
      - extract colors, typography, spacing, and logo constraints from file-backed brand inputs
      - normalize brand tokens into renderer-safe template semantics
      - keep brand rules inside `TemplateProfile` rather than ad hoc CSS-only overrides

  template-interpreter:
    name: Template Interpreter
    role: systems
    input:
      - uploaded template files
    output: TemplateProfile
    responsibilities:
      - parse PPTX theme and placeholders
      - merge template layout cues with brand-token guidance
      - downgrade PDF input to style-reference mode

  render-architect:
    name: Render Architect
    role: systems
    input:
      - SlideSpec[]
      - TemplateProfile
    output:
      - pptx artifact
      - pdf artifact
    responsibilities:
      - route standard charts to editable PPT charts when possible
      - route advanced charts to ECharts SSR
      - generate Browserless PDF from HTML
      - preserve static export fidelity without coupling to interactive preview behavior

  qa-guardian:
    name: QA Guardian
    role: validator
    input:
      - DatasetProfile
      - InsightSpec[]
      - StorySpec
      - SlideSpec[]
      - rendered artifacts
    responsibilities:
      - schema validation
      - evidence coverage checks
      - overflow and missing-asset checks
      - artifact-open validation
