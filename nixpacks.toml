[phases.setup]
# Railway installs the full pnpm workspace graph for the worker service.
# Keep native build tooling available for workspace deps that may fall back
# to node-gyp during Git-connected builds, such as @discordjs/opus.
# Fonts for @resvg/resvg-js are NOT installed via Nix because Nix profile
# paths are not in fontconfig's default scan list — system font installation
# is unreliable in this environment. Instead, the worker bundles DejaVu TTFs
# via the `dejavu-fonts-ttf` npm package and loads them explicitly via
# `fontFiles` in packages/workflows/src/generate-deck.ts.
nixPkgs = ["...", "python3", "gcc", "gnumake"]

[variables]
# Ensure node-gyp uses the Nix-provided Python instead of relying on a Debian
# python symlink from apt.
PYTHON = "python3"

[phases.build]
# Railway's mounted .next/cache has been intermittently failing with ENOENT
# during Next's config cache rename step. Keep the node_modules cache, but
# let Next rebuild its own cache directory fresh inside the container.
cmds = [
  "rm -rf apps/web/.next",
  "mkdir -p apps/web/.next/cache",
  "pnpm run build",
]
cacheDirectories = ["node_modules/.cache"]
